<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Game Hub</title>
    <meta name="description" content="Play Snake online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">🕹️ Snake</span>
        <span class="standalone-category">Arcade</span>
    </div>

    <div id="snake-wrapper" class="gw standalone">
<div id="snake-controls">
                <button id="snake-new-btn">New Game</button>
                <div id="snake-score">Score: 0</div>
                <div id="snake-high-score">Best: 0</div>
            </div>
            <canvas id="snake-canvas" width="400" height="400"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'snake');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('snake-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Snake - Game Hub';
});
    </script>
</body>
</html>
