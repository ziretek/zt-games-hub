<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archery - Game Hub</title>
    <meta name="description" content="Play Archery online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">⚽ Archery</span>
        <span class="standalone-category">Sports</span>
    </div>

    <div id="archery-wrapper" class="gw standalone">
<div id="archery-controls">
                <button id="archery-new-btn">New Game</button>
                <div id="archery-score">Score: 0</div>
                <div id="archery-round">Round: 1 / 10</div>
                <div id="archery-wind">Wind: 0.0</div>
            </div>
            <canvas id="archery-canvas" width="500" height="400"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'archery');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('archery-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Archery - Game Hub';
});
    </script>
</body>
</html>
