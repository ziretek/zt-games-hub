<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball - Game Hub</title>
    <meta name="description" content="Play Baseball online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">⚽ Baseball</span>
        <span class="standalone-category">Sports</span>
    </div>

    <div id="baseball-wrapper" class="gw standalone">
<div id="baseball-controls">
                <button id="baseball-new-btn">New Game</button>
                <div id="baseball-score">Runs: 0</div>
                <div id="baseball-outs">Outs: 0 / 3</div>
                <div id="baseball-inning">Inning: 1</div>
            </div>
            <canvas id="baseball-canvas" width="500" height="400"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'baseball');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('baseball-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Baseball - Game Hub';
});
    </script>
</body>
</html>
