<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search - Game Hub</title>
    <meta name="description" content="Play Word Search online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">📝 Word Search</span>
        <span class="standalone-category">Word</span>
    </div>

    <div id="wordsearch-wrapper" class="gw standalone">
<div id="wordsearch-controls">
                <button id="wordsearch-new-btn">New Game</button>
                <div id="wordsearch-found">Found: 0/0</div>
                <div id="wordsearch-score">Score: 0</div>
            </div>
            <div id="wordsearch-game-area">
                <canvas id="wordsearch-canvas" width="360" height="360"></canvas>
                <div id="wordsearch-words"></div>
            </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'wordsearch');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('wordsearch-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Word Search - Game Hub';
});
    </script>
</body>
</html>
