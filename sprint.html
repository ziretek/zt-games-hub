<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint - Game Hub</title>
    <meta name="description" content="Play Sprint online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">⚽ Sprint</span>
        <span class="standalone-category">Sports</span>
    </div>

    <div id="sprint-wrapper" class="gw standalone">
<div id="sprint-controls">
                <button id="sprint-new-btn">New Game</button>
                <div id="sprint-dist">Distance: 0m</div>
                <div id="sprint-time">Time: 0.0s</div>
                <div id="sprint-best">Best: 0.0s</div>
            </div>
            <canvas id="sprint-canvas" width="600" height="300"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'sprint');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('sprint-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Sprint - Game Hub';
});
    </script>
</body>
</html>
