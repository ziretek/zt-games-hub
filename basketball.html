<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball - Game Hub</title>
    <meta name="description" content="Play Basketball online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">⚽ Basketball</span>
        <span class="standalone-category">Sports</span>
    </div>

    <div id="basketball-wrapper" class="gw standalone">
<div id="basketball-controls">
                <button id="basketball-new-btn">New Game</button>
                <div id="basketball-score">Score: 0</div>
                <div id="basketball-streak">Streak: 0</div>
                <div id="basketball-timer">Time: 30</div>
                <div id="basketball-best">Best: 0</div>
                <div id="basketball-acc">FG: 0/0</div>
            </div>
            <canvas id="basketball-canvas" width="400" height="500"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'basketball');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('basketball-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Basketball - Game Hub';
});
    </script>
</body>
</html>
