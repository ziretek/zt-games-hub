<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee - Game Hub</title>
    <meta name="description" content="Play Spelling Bee online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">📝 Spelling Bee</span>
        <span class="standalone-category">Word</span>
    </div>

    <div id="spellingbee-wrapper" class="gw standalone">
<div id="spellingbee-controls">
                <button id="spellingbee-new-btn">New Game</button>
                <div id="spellingbee-score">Score: 0</div>
                <div id="spellingbee-found">Words: 0</div>
            </div>
            <div id="spellingbee-game-area">
                <div id="spellingbee-letters"></div>
                <div id="spellingbee-input-row">
                    <input id="spellingbee-input" type="text" placeholder="Type a word..." maxlength="12">
                    <button id="spellingbee-submit">Submit</button>
                    <button id="spellingbee-shuffle-btn">Shuffle</button>
                </div>
                <div id="spellingbee-message"></div>
                <div id="spellingbee-word-list"></div>
            </div>
        </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'spellingbee');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('spellingbee-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Spelling Bee - Game Hub';
});
    </script>
</body>
</html>
