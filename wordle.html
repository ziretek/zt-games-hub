<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle - Game Hub</title>
    <meta name="description" content="Play Wordle online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">📝 Wordle</span>
        <span class="standalone-category">Word</span>
    </div>

    <div id="wordle-wrapper" class="gw standalone">
<div id="wordle-controls">
                <button id="wordle-new-btn">New Game</button>
                <div id="wordle-message"></div>
                <div id="wordle-stats"></div>
            </div>
            <div id="wordle-game-area">
                <div id="wordle-grid"></div>
                <div id="wordle-keyboard"></div>
            </div>
        </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'wordle');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('wordle-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Wordle - Game Hub';
});
    </script>
</body>
</html>
