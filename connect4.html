<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 - Game Hub</title>
    <meta name="description" content="Play Connect 4 online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">♟️ Connect 4</span>
        <span class="standalone-category">Board</span>
    </div>

    <div id="connect4-wrapper" class="gw standalone">
<div id="connect4-controls">
                <button id="c4-new-btn">New Game</button>
                <button id="c4-ai-btn">Vs Computer: Off</button>
                <div id="c4-turn">Turn: Red</div>
            </div>
            <div id="connect4-board"></div>
        </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'connect4');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('connect4-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Connect 4 - Game Hub';
});
    </script>
</body>
</html>
