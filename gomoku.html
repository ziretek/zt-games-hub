<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku - Game Hub</title>
    <meta name="description" content="Play Gomoku online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">♟️ Gomoku</span>
        <span class="standalone-category">Board</span>
    </div>

    <div id="gomoku-wrapper" class="gw standalone">
<div id="gomoku-controls">
                <button id="gom-new-btn">New Game</button>
                <button id="gom-ai-btn">Vs Computer: On</button>
                <div id="gom-turn">Turn: Black</div>
            </div>
            <div id="gomoku-board"></div>
        </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'gomoku');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('gomoku-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Gomoku - Game Hub';
});
    </script>
</body>
</html>
