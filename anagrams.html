<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrams - Game Hub</title>
    <meta name="description" content="Play Anagrams online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">📝 Anagrams</span>
        <span class="standalone-category">Word</span>
    </div>

    <div id="anagrams-wrapper" class="gw standalone">
<div id="anagrams-controls">
                <button id="anagrams-new-btn">New Game</button>
                <div id="anagrams-score">Score: 0</div>
                <div id="anagrams-streak">Streak: 0</div>
            </div>
            <div id="anagrams-game-area">
                <div id="anagrams-word">SCRAMBLE</div>
                <div id="anagrams-hint"></div>
                <div id="anagrams-input-row">
                    <input id="anagrams-input" type="text" placeholder="Your answer..." maxlength="12">
                    <button id="anagrams-submit">Submit</button>
                    <button id="anagrams-hint-btn">Hint</button>
                </div>
                <div id="anagrams-result"></div>
            </div>
        </div>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'anagrams');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    
    document.getElementById('anagrams-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Anagrams - Game Hub';
});
    </script>
</body>
</html>
