<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Kicker - Game Hub</title>
    <meta name="description" content="Play Penalty Kicker online">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="aiBackground"></canvas>

    <div class="standalone-bar">
        <button onclick="location.href='index.html'" class="standalone-back" aria-label="Back to Hub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
            Hub
        </button>
        <span class="standalone-title">⚽ Penalty Kicker</span>
        <span class="standalone-category">Sports</span>
    </div>

    <div id="penaltykicker-wrapper" class="gw standalone">
<div id="penaltykicker-controls">
                <button id="penaltykicker-new-btn">New Game</button>
                <div id="penaltykicker-score">Goals: 0 / 5</div>
                <div id="penaltykicker-msg">Aim with mouse, click to shoot</div>
            </div>
            <canvas id="penaltykicker-canvas" width="400" height="400"></canvas>
</div>

    <script src="script.js"></script>
    <script>
window.addEventListener('load', () => {
    const entry = GAMES.find(g => g.id === 'penaltykicker');
    if (!entry) return;
    const key = entry.id + 'Game';
    window[key] = entry.create();
    window[key].init();
    document.getElementById('penaltykicker-wrapper').classList.add('active');
    currentBackground = new MarvelBackground('aiBackground');
    document.title = 'Penalty Kicker - Game Hub';
});
    </script>
</body>
</html>
